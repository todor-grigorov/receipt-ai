name: CI - Integration Tests

on:
    pull_request:
        branches: [main]
        paths:
            - "apps/api/**"
            - ".github/workflows/ci-integration.yml"

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Run integration tests
              run: dotnet test apps/api/ReceiptAI/ReceiptAI.IntegrationTests/ReceiptAI.IntegrationTests.csproj --configuration Release
