name: CI - API Unit Tests

on:
    pull_request:
        branches: [main]
        paths:
            - "apps/api/**"
            - ".github/workflows/ci-api.yml"

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup .NET
              uses: actions/setup-dotnet@v4
              with:
                  dotnet-version: "10.0.x"

            - name: Restore dependencies
              run: dotnet restore apps/api/ReceiptAI/ReceiptAI.slnx

            - name: Build
              run: dotnet build apps/api/ReceiptAI/ReceiptAI.slnx --no-restore --configuration Release

            - name: Run unit tests
              run: dotnet test apps/api/ReceiptAI/ReceiptAI.UnitTests/ReceiptAI.UnitTests.csproj --no-build --configuration Release
